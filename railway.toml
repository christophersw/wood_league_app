[build]
builder = "RAILPACK"

[deploy]
startCommand = "python manage.py migrate --run-syncdb && python manage.py copy_vendor_js && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 120
