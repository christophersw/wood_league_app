<h2 style="margin: 0 0 1.5rem 0;">API Key Created</h2>

<div style="background: var(--color-parchment); padding: 1.5rem; border-left: 3px solid var(--color-gold); margin-bottom: 1.5rem;">
  <p style="margin: 0 0 1rem 0; color: var(--color-slate); font-size: 0.9rem;">
    <strong>Save this key now.</strong> You won't be able to see it again.
  </p>
  
  <div style="background: var(--color-cream); padding: 1rem; border: 1px solid var(--color-peat); border-radius: 3px; font-family: var(--font-mono); font-size: 0.85rem; word-break: break-all; margin-bottom: 1rem;" id="key-box">
    {{ raw_key }}
  </div>
  
  <button type="button" 
          class="btn btn-primary"
          id="copy-btn"
          onclick="copyToClipboard()">
    Copy to Clipboard
  </button>
</div>

<div style="background: var(--color-cream); padding: 1rem; border-left: 3px solid var(--color-forest); margin-bottom: 1.5rem;">
  <p style="margin: 0 0 0.5rem 0; font-weight: 500;">Worker ID: <code>{{ key.id }}</code></p>
  <p style="margin: 0 0 0.5rem 0; font-weight: 500;">Key Prefix: <code style="color: var(--color-whisky);">{{ key.prefix }}</code></p>
  <p style="margin: 0; font-size: 0.9rem; color: var(--color-slate);">
    The prefix is safe to log. Store the full key securely.
  </p>
</div>

<div style="display: flex; gap: 1rem; justify-content: flex-end;">
  <button type="button" 
          class="btn btn-primary"
          onclick="confirmAndRefresh()">
    I have saved this key
  </button>
</div>

<script>
  function copyToClipboard() {
    const text = document.getElementById('key-box').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  }
  
  function confirmAndRefresh() {
    closeModal();
    htmx.ajax('GET', '{% url "api-keys-list-partial" %}', '#keys-body');
  }
</script>
